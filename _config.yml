title: IBM Bob Labs
description: A playbook for replacing repetitive work with Bob, validated through a hackathon.
url: "https://ce-aie-labs.github.io"
baseurl: "/bob-labs"

collections:
  labs:
    output: true
    permalink: /en/labs/:path/
  labs_ko:
    output: true
    permalink: /ko/labs/:path/

defaults:
  - scope:
      path: ""
      type: labs
    values:
      layout: lab
  - scope:
      path: ""
      type: labs_ko
    values:
      layout: lab
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - AGENTS.md
  - CLAUDE.md
  - CONTRIBUTING.md
  - DESIGN.md
  - NOTE.md
  - docs
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - ".github"

# Bobathon submission form (MS Forms / Google Forms).
# Leave empty until the form exists - the submit button renders disabled and
# says so, rather than linking somewhere broken.
bobathon:
  submit_url: ""

plugins:
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
