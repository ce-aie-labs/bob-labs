---
layout: default
---
<div class="page">
  <div class="lab-detail">
    <h1>{{ page.title }}</h1>
    {{ content }}
    <div class="metadata-row">
      <span class="badge">Difficulty: {{ page.difficulty }}</span>
      <span class="badge">Duration: {{ page.duration }}</span>
      <span class="badge stack">Stack: {{ page.stack }}</span>
      <span class="badge">Work replaced: {{ page.work_replaced }}</span>
      <span class="badge">Saving: {{ page.expected_saving }}</span>
    </div>
  </div>
</div>
