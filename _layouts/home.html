---
layout: default
---
{% assign labs = site.labs %}
{% if page.lang == "ko" %}
  {% assign labs = site.labs_ko %}
{% endif %}
<div class="page">
  <div class="intro">
    <h1>{{ page.title }}</h1>
    <p>{{ page.description }}</p>
  </div>

  <div class="lab-grid">
    {% for lab in labs %}
      {% include lab-card.html lab=lab %}
    {% endfor %}
  </div>
</div>
