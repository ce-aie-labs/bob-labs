<a class="lab-card" href="{{ include.lab.url | relative_url }}">
  <div class="badges">
    <span class="badge stack">{{ include.lab.stack }}</span>
    <span class="badge">{{ include.lab.difficulty }}</span>
    <span class="badge">{{ include.lab.duration }}</span>
  </div>
  <h2>{{ include.lab.title }}</h2>
  <p class="problem">{{ include.lab.content | strip_html | remove: "Problem" | strip | truncatewords: 24 }}</p>
  <p class="saving">{{ include.lab.expected_saving }}</p>
</a>
